name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14.1"
          opam-repositories: |
            rocq-released: https://rocq-prover.org/opam/released
            default: https://opam.ocaml.org

      - name: Install Rocq
        run: opam install rocq-prover

      - name: Build
        run: |
          eval $(opam env)
          make
